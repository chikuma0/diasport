<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diasport Vol.2 — Story</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #DAA520;
    --gold-light: #F0D060;
    --gold-dim: #B8860B;
    --bg-deep: #0d2818;
    --bg-mid: #1a3a2a;
    --bg-accent: #2d8a7a;
    --white: #f0f0f0;
    --white-dim: rgba(240,240,240,0.6);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    overflow: hidden;
    background: #000;
    font-family: 'Space Grotesk', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .story-frame {
    position: relative;
    width: calc(100vh * 9 / 16);
    max-width: 100vw;
    height: 100vh;
    max-height: calc(100vw * 16 / 9);
    overflow: hidden;
    background: linear-gradient(170deg, var(--bg-mid) 0%, var(--bg-accent) 40%, var(--bg-deep) 100%);
  }

  /* Subtle radial glow behind countdown */
  .story-frame::before {
    content: '';
    position: absolute;
    top: 35%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 80%;
    height: 40%;
    background: radial-gradient(ellipse, rgba(218,165,32,0.08) 0%, transparent 70%);
    pointer-events: none;
    z-index: 1;
  }

  /* Particle canvas */
  #particles {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 2;
    pointer-events: none;
  }

  /* Content layers */
  .content {
    position: relative;
    z-index: 3;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    height: 100%;
    padding: 8% 6% 6%;
    text-align: center;
  }

  /* Logo */
  .logo-wrap img {
    height: 3.5rem;
    opacity: 0.9;
    filter: drop-shadow(0 0 12px rgba(218,165,32,0.3));
  }

  /* Hero countdown */
  .hero { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1.2rem; }

  .countdown {
    display: flex;
    align-items: baseline;
    gap: 0.3em;
  }

  .countdown .unit {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .countdown .num {
    font-size: 6rem;
    font-weight: 700;
    color: var(--gold);
    line-height: 1;
    letter-spacing: -0.03em;
    text-shadow:
      0 0 30px rgba(218,165,32,0.4),
      0 0 60px rgba(218,165,32,0.15);
    font-variant-numeric: tabular-nums;
  }

  .countdown .label {
    font-size: 0.85rem;
    font-weight: 400;
    color: var(--white-dim);
    text-transform: uppercase;
    letter-spacing: 0.15em;
    margin-top: 0.25rem;
  }

  .countdown .sep {
    font-size: 4rem;
    font-weight: 300;
    color: var(--gold-dim);
    opacity: 0.5;
    line-height: 1;
    padding: 0 0.05em;
    align-self: flex-start;
    margin-top: 0.1em;
  }

  .tonight {
    font-size: 5rem;
    font-weight: 700;
    color: var(--gold);
    text-shadow: 0 0 40px rgba(218,165,32,0.5);
    display: none;
  }

  /* Flyer */
  .flyer-wrap {
    width: min(55vw, 220px);
    aspect-ratio: 1/1;
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 8px 32px rgba(0,0,0,.3), 0 0 40px rgba(218,165,32,.1);
    margin: 0.8rem 0;
  }
  .flyer-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  /* Title */
  .title-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.2rem;
  }

  .title-block .vol {
    font-size: 1.8rem;
    font-weight: 600;
    color: var(--white);
    letter-spacing: 0.05em;
  }

  .title-block .artist {
    font-size: 1.4rem;
    font-weight: 500;
    color: var(--gold);
    letter-spacing: 0.08em;
  }

  /* Event info */
  .event-info {
    font-size: 0.95rem;
    font-weight: 400;
    color: var(--white-dim);
    letter-spacing: 0.04em;
    line-height: 1.5;
  }

  /* Footer */
  .footer {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.25rem;
  }

  .footer .handle {
    font-size: 0.8rem;
    color: var(--white-dim);
    letter-spacing: 0.06em;
    opacity: 0.7;
  }

  .footer .link {
    font-size: 0.85rem;
    font-weight: 500;
    color: var(--gold-dim);
    letter-spacing: 0.06em;
  }
</style>
</head>
<body>
<div class="story-frame">
  <canvas id="particles"></canvas>
  <div class="content">
    <!-- Logo -->
    <div class="logo-wrap">
      <img src="diasport-logo.png" alt="Diasport">
    </div>

    <!-- Hero -->
    <div class="hero">
      <div class="countdown" id="countdown">
        <div class="unit"><span class="num" id="cd-days">--</span><span class="label">Days</span></div>
        <span class="sep">:</span>
        <div class="unit"><span class="num" id="cd-hours">--</span><span class="label">Hours</span></div>
        <span class="sep">:</span>
        <div class="unit"><span class="num" id="cd-mins">--</span><span class="label">Min</span></div>
      </div>
      <div class="tonight" id="tonight">🎵 Tonight!</div>

      <div class="flyer-wrap">
        <img src="flyer-vol2.jpg" alt="Diasport Vol.2 — mitokon">
      </div>

      <div class="title-block">
        <span class="vol">Diasport Vol.2</span>
        <span class="artist">mitokon</span>
      </div>
    </div>

    <!-- Event info -->
    <div class="event-info">
      Fri 3 Apr · 19:00 · RecordCity, Nishi-Shinjuku · Free
    </div>

    <!-- Footer -->
    <div class="footer">
      <span class="handle">@diasport.world</span>
      <span class="link">diasport.world</span>
    </div>
  </div>
</div>

<script>
// --- Countdown ---
const TARGET = new Date('2026-04-03T19:00:00+09:00').getTime();
const $days = document.getElementById('cd-days');
const $hours = document.getElementById('cd-hours');
const $mins = document.getElementById('cd-mins');
const $countdown = document.getElementById('countdown');
const $tonight = document.getElementById('tonight');

function pad(n) { return String(n).padStart(2, '0'); }

function tick() {
  const diff = TARGET - Date.now();
  if (diff <= 0) {
    $countdown.style.display = 'none';
    $tonight.style.display = 'block';
    return;
  }
  const d = Math.floor(diff / 86400000);
  const h = Math.floor((diff % 86400000) / 3600000);
  const m = Math.floor((diff % 3600000) / 60000);
  $days.textContent = pad(d);
  $hours.textContent = pad(h);
  $mins.textContent = pad(m);
}
tick();
setInterval(tick, 1000);

// --- Particles (leaves + fireflies) ---
(function() {
  const canvas = document.getElementById('particles');
  const ctx = canvas.getContext('2d');
  let W, H;

  function resize() {
    const rect = canvas.parentElement.getBoundingClientRect();
    W = canvas.width = rect.width;
    H = canvas.height = rect.height;
  }
  resize();
  window.addEventListener('resize', resize);

  // Leaf shapes
  function drawLeaf(x, y, size, angle, opacity) {
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(angle);
    ctx.globalAlpha = opacity;
    ctx.fillStyle = '#2d6b4a';
    ctx.beginPath();
    ctx.moveTo(0, -size);
    ctx.quadraticCurveTo(size * 0.6, -size * 0.3, 0, size);
    ctx.quadraticCurveTo(-size * 0.6, -size * 0.3, 0, -size);
    ctx.fill();
    ctx.restore();
  }

  // Firefly glow
  function drawFirefly(x, y, radius, opacity) {
    ctx.save();
    ctx.globalAlpha = opacity;
    const grad = ctx.createRadialGradient(x, y, 0, x, y, radius);
    grad.addColorStop(0, 'rgba(240,208,96,0.9)');
    grad.addColorStop(0.4, 'rgba(218,165,32,0.4)');
    grad.addColorStop(1, 'rgba(218,165,32,0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(x, y, radius, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  const LEAF_COUNT = 18;
  const FIREFLY_COUNT = 25;

  const leaves = Array.from({length: LEAF_COUNT}, () => ({
    x: Math.random() * 1.2 - 0.1,
    y: Math.random() * 1.2 - 0.1,
    size: 6 + Math.random() * 10,
    speed: 0.0002 + Math.random() * 0.0004,
    drift: (Math.random() - 0.5) * 0.0003,
    angle: Math.random() * Math.PI * 2,
    spin: (Math.random() - 0.5) * 0.01,
    opacity: 0.15 + Math.random() * 0.25,
  }));

  const fireflies = Array.from({length: FIREFLY_COUNT}, () => ({
    x: Math.random(),
    y: Math.random(),
    radius: 3 + Math.random() * 8,
    baseOpacity: 0.2 + Math.random() * 0.5,
    phase: Math.random() * Math.PI * 2,
    freq: 0.005 + Math.random() * 0.015,
    driftX: (Math.random() - 0.5) * 0.0004,
    driftY: (Math.random() - 0.5) * 0.0003,
  }));

  let frame = 0;
  function animate() {
    ctx.clearRect(0, 0, W, H);
    frame++;

    // Leaves
    for (const l of leaves) {
      l.y += l.speed;
      l.x += l.drift + Math.sin(frame * 0.008 + l.angle) * 0.0002;
      l.angle += l.spin;
      if (l.y > 1.1) { l.y = -0.1; l.x = Math.random(); }
      if (l.x > 1.1) l.x = -0.1;
      if (l.x < -0.1) l.x = 1.1;
      drawLeaf(l.x * W, l.y * H, l.size, l.angle, l.opacity);
    }

    // Fireflies
    for (const f of fireflies) {
      f.x += f.driftX + Math.sin(frame * 0.003 + f.phase) * 0.0002;
      f.y += f.driftY + Math.cos(frame * 0.004 + f.phase) * 0.00015;
      if (f.x > 1.1) f.x = -0.05;
      if (f.x < -0.1) f.x = 1.05;
      if (f.y > 1.1) f.y = -0.05;
      if (f.y < -0.1) f.y = 1.05;
      const opacity = f.baseOpacity * (0.5 + 0.5 * Math.sin(frame * f.freq + f.phase));
      drawFirefly(f.x * W, f.y * H, f.radius, opacity);
    }

    requestAnimationFrame(animate);
  }
  animate();
})();
</script>
</body>
</html>
